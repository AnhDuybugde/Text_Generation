<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiên Đạo Kỷ Nguyên - AI Tạo Sinh Tiểu Thuyết</title>
    <meta name="description" content="Nền tảng AI tạo sinh tiểu thuyết Kiếm Hiệp & Tu Tiên tiếng Việt với hình ảnh minh họa và giọng đọc">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="particles" id="particles"></div>
    
    <main class="app-container">
        <header class="app-header">
            <h1 class="logo-title">Tiên Đạo Kỷ Nguyên</h1>
            <p class="subtitle">AI Text Generation Platform - Wuxia & Xianxia</p>
        </header>

        <!-- PANEL 1: SINH VĂN BẢN -->
        <div class="glass-panel main-panel">
            <div class="input-section">
                <label for="prompt-input" class="section-label">Câu mồi (Prompt)</label>
                <textarea id="prompt-input" placeholder="Ví dụ: Giữa Vạn Yêu Cốc sương mù mờ mịt, Lục Dương nắm chặt chuôi kiếm..."></textarea>
                
                <div class="advanced-controls">
                    <div class="control-group">
                        <label for="temp-slider">Sáng tạo (Temperature): <span id="temp-val">0.8</span></label>
                        <input type="range" id="temp-slider" min="0.1" max="1.5" step="0.1" value="0.8">
                    </div>
                    <div class="control-group">
                        <label for="length-slider">Độ dài (Tokens): <span id="length-val">150</span></label>
                        <input type="range" id="length-slider" min="50" max="500" step="10" value="150">
                    </div>
                </div>

                <button id="generate-btn" class="generate-btn">
                    <span class="btn-text">⚔️ Vận Công Sinh Chữ</span>
                    <span class="loader" id="loader"></span>
                </button>
            </div>

            <div class="output-section">
                <label class="section-label">Kết Quả Diễn Biến</label>
                <div id="output-box" class="output-box">
                    <p class="placeholder-text">Truyền vào đạo vận để xuất hiện nội dung...</p>
                </div>

                <!-- THANH CÔNG CỤ: ĐỌC + VẼ -->
                <div class="action-toolbar" id="action-toolbar" style="display: none;">
                    <!-- Giọng đọc -->
                    <div class="toolbar-group">
                        <select id="voice-select" class="voice-select">
                            <option value="vi-VN-HoaiMyNeural">🎙️ Hoài My (Nữ)</option>
                            <option value="vi-VN-NamMinhNeural">🎙️ Nam Minh (Nam)</option>
                        </select>
                        <button id="tts-btn" class="action-btn tts-btn" title="Đọc to nội dung">
                            <span class="btn-icon">🔊</span>
                            <span>Đọc Truyện</span>
                        </button>
                    </div>
                    <!-- Sinh ảnh -->
                    <div class="toolbar-group">
                        <button id="image-btn" class="action-btn image-btn" title="Tạo ảnh minh họa">
                            <span class="btn-icon">🎨</span>
                            <span>Vẽ Minh Họa</span>
                        </button>
                    </div>
                </div>

                <!-- Audio Player -->
                <div id="audio-container" class="audio-container" style="display: none;">
                    <audio id="audio-player" controls class="audio-player"></audio>
                </div>

                <!-- Ảnh minh họa -->
                <div id="image-container" class="image-container" style="display: none;">
                    <label class="section-label" style="margin-top: 12px;">🖼️ Ảnh Minh Họa</label>
                    <div class="image-wrapper">
                        <img id="generated-image" alt="Ảnh minh họa tiểu thuyết" class="generated-image">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
